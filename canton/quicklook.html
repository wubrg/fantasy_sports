<script>
const NAMED_AWARDS = new Set(["AP MVP", "AP OPOY", "AP DPOY", "AP OROTY", "AP DROTY", "AP CPOTY", "SB MVP"]);
const { meta, data: rows } = JSON.parse(document.getElementById("awards-data").textContent);

const state = { team: "", unit: "", yearMin: meta.years[0], yearMax: meta.years[1] };

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

function buildTeamSelect() {
  const sel = document.getElementById("team-select");
  sel.innerHTML = '<option value="">All Teams</option>';
  const teams = [...meta.teams].sort((a, b) => meta.team_names[a].localeCompare(meta.team_names[b]));
  for (const code of teams) {
    const o = document.createElement("option");
    o.value = code;
    o.textContent = meta.team_names[code];
    sel.appendChild(o);
  }
}

function buildYearInputs() {
  const [min, max] = meta.years;
  const minInput = document.getElementById("year-min");
  const maxInput = document.getElementById("year-max");
  minInput.min = maxInput.min = min;
  minInput.max = maxInput.max = max;
  minInput.value = min;
  maxInput.value = max;
}

function wireEvents() {
  document.getElementById("team-select").addEventListener("change", (e) => {
    state.team = e.target.value;
    render();
  });
  document.getElementById("unit-toggle").addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;
    for (const b of e.currentTarget.querySelectorAll("button")) b.classList.toggle("active", b === btn);
    state.unit = btn.dataset.unit;
    render();
  });
  document.getElementById("year-min").addEventListener("input", (e) => {
    state.yearMin = Number(e.target.value);
    render();
  });
  document.getElementById("year-max").addEventListener("input", (e) => {
    state.yearMax = Number(e.target.value);
    render();
  });
}

function render() {
  const filtered = rows
    .filter((r) => (!state.team || r.tm === state.team)
      && (!state.unit || r.u === state.unit)
      && r.yr >= state.yearMin && r.yr <= state.yearMax)
    .sort((a, b) => b.yr - a.yr);

  const list = document.getElementById("results");
  document.getElementById("result-count").textContent =
    `${filtered.length} result${filtered.length === 1 ? "" : "s"}`;

  if (filtered.length === 0) {
    list.innerHTML = '<li class="empty">No matches.</li>';
    return;
  }

  list.innerHTML = filtered.map((r) => `
    <li class="${NAMED_AWARDS.has(r.aw) ? "named-award" : ""}">
      <span class="row-year">${r.yr}</span>${escapeHtml(r.pl)} (${escapeHtml(r.pos)}, ${escapeHtml(r.tm)})
      <span class="row-award">&mdash; ${escapeHtml(r.aw)}</span>
    </li>
  `).join("");
}

buildTeamSelect();
buildYearInputs();
wireEvents();
render();
</script>
